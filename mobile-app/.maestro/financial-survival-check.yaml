# No deep link exists yet to reach this screen directly, so this flow
# replays Register first (same as register.yaml) before testing this
# screen's own elements.
appId: com.nera.app
---
- launchApp:
    clearState: true
- evalScript: ${output.uniqueId = Date.now()}
- tapOn:
    id: "register-name-input"
- inputText: "Test User"
- tapOn:
    id: "register-phone-input"
- inputText: "08${output.uniqueId}"
- tapOn:
    id: "register-email-input"
- inputText: "test${output.uniqueId}@nera.test"
- tapOn:
    id: "register-password-input"
- inputText: "password123"
- tapOn:
    id: "register-submit-button"
- assertVisible: "Cek Kondisi Keuanganmu"
- assertVisible:
    id: "fsc-submit-button"
- tapOn:
    id: "fsc-income-input"
- inputText: "3000000"
- tapOn:
    id: "fsc-debt-input"
- inputText: "200000"
- assertVisible: "% dari pemasukanmu"
- tapOn:
    id: "fsc-submit-button"
- assertVisible: "Profil kamu berhasil disimpan."
- assertVisible: "Ceritakan Pinjaman yang Kamu Pertimbangkan"
