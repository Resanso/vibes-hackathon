# No deep link exists yet to reach MainTabs directly, so this flow replays
# Register + the full 5-step onboarding first, then exercises each of the 5
# tabs.
appId: com.nera.app
---
- launchApp:
    clearState: true
- evalScript: ${output.uniqueId = Date.now()}
- tapOn:
    id: "register-name-input"
- inputText: "Test User"
- tapOn:
    id: "register-phone-input"
- inputText: "08${output.uniqueId}"
- tapOn:
    id: "register-email-input"
- inputText: "test${output.uniqueId}@nera.test"
- tapOn:
    id: "register-password-input"
- inputText: "password123"
- tapOn:
    id: "register-submit-button"
- assertVisible: "Cek Kondisi Keuanganmu"
- tapOn:
    id: "fsc-income-input"
- inputText: "3000000"
- tapOn:
    id: "fsc-debt-input"
- inputText: "200000"
- tapOn:
    id: "fsc-submit-button"
- assertVisible: "Ceritakan Pinjaman yang Kamu Pertimbangkan"
- tapOn:
    id: "bs-principal-input"
- inputText: "2000000"
- tapOn:
    id: "bs-interest-rate-input"
- inputText: "12"
- tapOn:
    id: "bs-tenor-input"
- inputText: "6"
- tapOn:
    id: "bs-submit-button"
- assertVisible: "Analisis Risiko Pinjamanmu"
- tapOn:
    id: "fri-see-alternatives-button"
- assertVisible: "Alternatif yang Bisa Kamu Pertimbangkan"
- tapOn:
    id: "ds-see-dashboard-button"
- assertVisible: "Terus pantau skormu"

- tapOn: "Alternatif"
- assertVisible: "Alternatif yang Lebih Aman"

- tapOn: "Edukasi"
- assertVisible: "Materi edukasi finansial akan hadir di sini."

- tapOn: "Profil"
- assertVisible: "08${output.uniqueId}"

- tapOn: "Beranda"
- assertVisible: "Terus pantau skormu"
