# Exercises the "Cek Baru" tab: re-triggers BorrowingScenario→
# FinancialRiskIntelligence in standalone mode (no step header, skips
# FinancialSurvivalCheck since the profile already exists from onboarding).
appId: com.nera.app
---
- launchApp:
    clearState: true
- tapOn:
    id: "onboarding-phone-input"
- inputText: "081234567890"
- tapOn:
    id: "onboarding-start-button"
- assertVisible: "Cek Kondisi Keuanganmu"
- tapOn:
    id: "fsc-income-input"
- inputText: "3000000"
- tapOn:
    id: "fsc-debt-input"
- inputText: "200000"
- tapOn:
    id: "fsc-submit-button"
- assertVisible: "Ceritakan Pinjaman yang Kamu Pertimbangkan"
- tapOn:
    id: "bs-principal-input"
- inputText: "2000000"
- tapOn:
    id: "bs-interest-rate-input"
- inputText: "12"
- tapOn:
    id: "bs-tenor-input"
- inputText: "6"
- tapOn:
    id: "bs-submit-button"
- assertVisible: "Analisis Risiko Pinjamanmu"
- tapOn:
    id: "fri-see-alternatives-button"
- tapOn:
    id: "ds-see-dashboard-button"
- assertVisible: "Terus pantau skormu"

- tapOn: "Cek Baru"
- assertVisible: "Ceritakan Pinjaman yang Kamu Pertimbangkan"
- assertNotVisible: "Langkah 3 dari 5"
- tapOn:
    id: "bs-principal-input"
- inputText: "1000000"
- tapOn:
    id: "bs-interest-rate-input"
- inputText: "10"
- tapOn:
    id: "bs-tenor-input"
- inputText: "3"
- tapOn:
    id: "bs-submit-button"
- assertVisible: "Analisis Risiko Pinjamanmu"
- assertVisible:
    id: "fri-done-button"
- tapOn:
    id: "fri-done-button"
- assertVisible: "Terus pantau skormu"
