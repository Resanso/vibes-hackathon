# Registers a fresh account, completes the full onboarding chain so
# onboardingCompletedAt gets set, logs out from ProfileTab, then logs back in
# with the same credentials — proving both the register->login round-trip
# and the "skip onboarding, straight to dashboard" behavior for a returning
# user (see App.tsx's initialRouteName logic).
appId: com.nera.app
---
- launchApp:
    clearState: true
- evalScript: ${output.uniqueId = Date.now()}
- tapOn:
    id: "register-name-input"
- inputText: "Test User"
- tapOn:
    id: "register-phone-input"
- inputText: "08${output.uniqueId}"
- tapOn:
    id: "register-email-input"
- inputText: "test${output.uniqueId}@nera.test"
- tapOn:
    id: "register-password-input"
- inputText: "password123"
- tapOn:
    id: "register-submit-button"
- assertVisible: "Cek Kondisi Keuanganmu"
- tapOn:
    id: "fsc-income-input"
- inputText: "3000000"
- tapOn:
    id: "fsc-debt-input"
- inputText: "200000"
- tapOn:
    id: "fsc-submit-button"
- assertVisible: "Ceritakan Pinjaman yang Kamu Pertimbangkan"
- tapOn:
    id: "bs-principal-input"
- inputText: "2000000"
- tapOn:
    id: "bs-interest-rate-input"
- inputText: "12"
- tapOn:
    id: "bs-tenor-input"
- inputText: "6"
- tapOn:
    id: "bs-submit-button"
- assertVisible: "Analisis Risiko Pinjamanmu"
- tapOn:
    id: "fri-see-alternatives-button"
- assertVisible: "Alternatif yang Bisa Kamu Pertimbangkan"
- tapOn:
    id: "ds-see-dashboard-button"
- assertVisible: "Terus pantau skormu"

- tapOn: "Profil"
- tapOn:
    id: "logout-button"
- assertVisible:
    id: "login-submit-button"

- tapOn:
    id: "login-email-input"
- inputText: "test${output.uniqueId}@nera.test"
- tapOn:
    id: "login-password-input"
- inputText: "password123"
- tapOn:
    id: "login-submit-button"
- assertVisible: "Terus pantau skormu"
